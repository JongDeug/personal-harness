<!DOCTYPE html>
<html><head><meta charset="utf-8">
<!-- Font Awesome 반드시 <style> 밖 link 태그로 -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;800;900&family=Noto+Sans+KR:wght@300;400;700;900&family=JetBrains+Mono:wght@400;600&display=swap');

* { margin:0; padding:0; box-sizing:border-box; }

body {
  width:1920px; height:1080px; overflow:hidden;
  background:linear-gradient(135deg,#0a0e1a 0%,#0d1530 50%,#080c1e 100%);
  font-family:'Inter','Noto Sans KR',sans-serif;
  color:#e6edf3;
  padding:70px 90px;
}

/* 상단 그라디언트 바 — 모든 슬라이드 공통 */
.top-bar {
  position:absolute; top:0; left:0; right:0; height:4px;
  background:linear-gradient(90deg,#6366f1,#06b6d4);
}

/* 제목 영역 */
h1 { font-size:48px; font-weight:800; margin-bottom:12px; }
.subtitle { font-size:22px; color:#8b949e; margin-bottom:44px; }

/* 카드 기본 */
.card {
  background:rgba(255,255,255,0.04);
  border:1.5px solid rgba(255,255,255,0.08);
  border-radius:20px;
  padding:28px;
}

/* 색상 변형 카드 */
.card.cyan   { background:rgba(6,182,212,0.05);   border-color:rgba(6,182,212,0.25); }
.card.indigo { background:rgba(99,102,241,0.05);  border-color:rgba(99,102,241,0.25); }
.card.purple { background:rgba(139,92,246,0.05);  border-color:rgba(139,92,246,0.25); }
.card.amber  { background:rgba(245,158,11,0.05);  border-color:rgba(245,158,11,0.25); }
.card.green  { background:rgba(63,185,80,0.05);   border-color:rgba(63,185,80,0.25); }
.card.red    { background:rgba(248,81,73,0.05);   border-color:rgba(248,81,73,0.20); }

/* 아이콘 박스 */
.icon-wrap {
  width:64px; height:64px; border-radius:16px;
  display:flex; align-items:center; justify-content:center;
  margin-bottom:16px;
}
.cyan   .icon-wrap { background:rgba(6,182,212,0.15);   color:#06b6d4; }
.indigo .icon-wrap { background:rgba(99,102,241,0.15);  color:#6366f1; }
.purple .icon-wrap { background:rgba(139,92,246,0.15);  color:#8b5cf6; }
.amber  .icon-wrap { background:rgba(245,158,11,0.15);  color:#f59e0b; }
.green  .icon-wrap { background:rgba(63,185,80,0.15);   color:#3fb950; }
.red    .icon-wrap { background:rgba(248,81,73,0.15);   color:#f85149; }

/* 본문 텍스트 */
.body-text { font-size:14px; color:#c9d1d9; line-height:1.8; }
.muted { color:#8b949e; }

/* mono — 코드/식별자. 한글 폴백 포함 필수 */
.mono {
  font-family:'JetBrains Mono','Noto Sans KR',monospace;
  font-size:13px;
  color:#c9d1d9;
}

/* chevron 흐름도용 */
.chevron-gap {
  width:40px; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
  font-size:24px; color:#4b5563;
}
</style></head><body>
<div class="top-bar"></div>

<!-- ───────── 콘텐츠 시작 ───────── -->

<h1><i class="fa-solid fa-cube" style="color:#06b6d4;margin-right:14px;"></i>슬라이드 제목</h1>
<p class="subtitle">슬라이드 부제 또는 한 줄 요약</p>

<!-- 예시: 카드 3개 grid -->
<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px;margin-top:20px;">

  <div class="card cyan">
    <div class="icon-wrap"><i class="fa-solid fa-bolt" style="font-size:28px;"></i></div>
    <div style="font-size:20px;font-weight:800;margin-bottom:8px;">카드 제목</div>
    <div class="body-text">본문 텍스트가 여기 들어갑니다.</div>
  </div>

  <div class="card purple">
    <div class="icon-wrap"><i class="fa-solid fa-rocket" style="font-size:28px;"></i></div>
    <div style="font-size:20px;font-weight:800;margin-bottom:8px;">카드 제목</div>
    <div class="body-text">본문 텍스트가 여기 들어갑니다.</div>
  </div>

  <div class="card green">
    <div class="icon-wrap"><i class="fa-solid fa-check" style="font-size:28px;"></i></div>
    <div style="font-size:20px;font-weight:800;margin-bottom:8px;">카드 제목</div>
    <div class="body-text">본문 텍스트가 여기 들어갑니다.</div>
  </div>

</div>

<!-- ───────── 콘텐츠 끝 ───────── -->
</body></html>
