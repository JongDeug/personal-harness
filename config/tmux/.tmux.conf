# Prefix: C-b → C-Space
unbind C-b
unbind C-a
set -g prefix C-Space
bind C-Space send-prefix

# Split (현재 pane 의 작업 디렉토리 유지)
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 새 창도 현재 디렉토리에서 열기
bind c new-window -c "#{pane_current_path}"

# Act live vim
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

set-window-option -g mode-keys vi

# -n은 prefix 무시
# M은 Alt

# Pane resize (prefix + H/J/K/L)
bind H resize-pane -L 5
bind J resize-pane -D 5
bind K resize-pane -U 5
bind L resize-pane -R 5

# Window move
unbind -n M-Left
unbind -n M-Right
bind -n M-Left previous-window
bind -n M-Right next-window

# Index
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Vi mode
setw -g mode-keys vi

# Faster escpae (Esc 입력 지연 시간 줄이기)
set -sg escape-time 10

# History
set -g history-limit 100000

# Reload
unbind r
bind r source-file ~/.tmux.conf \; display-message "Reloaded!"

# Better terminal colors
set -g default-terminal "tmux-256color"
set -as terminal-overrides ',xterm-256color:RGB'

# OSC 52: tmux 가 바깥 터미널(Windows Terminal)로 클립보드 신호를 전달/통과시킴
# → SSH 안쪽의 tmux/vim 에서 복사한 내용이 로컬 Windows 클립보드까지 도달
set -as terminal-features ',*:clipboard'
set -g allow-passthrough on

# Clipboard 연동
set -g set-clipboard on
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "tmux load-buffer -w -"
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux load-buffer -w -"
bind -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux load-buffer -w -"
bind -n MouseDrag1Pane copy-mode -M
bind -n MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "tmux load-buffer -w -"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator' # vim <-> tmux 이동 연결
set -g @plugin 'tmux-plugins/tmux-sensible' # 기본값 자동 튜닝
set -g @plugin 'tmux-plugins/tmux-resurrect' # 세션 저장/복원
set -g @plugin 'tmux-plugins/tmux-continuum' # 자동 저장/복원
set -g @plugin 'dracula/tmux' # 테마

# Dracula theme
set -g @dracula-show-powerline false
set -g @dracula-refresh-rate 5
set -g @dracula-show-left-icon "session"
set -g @dracula-show-flags true
set -g @dracula-plugins "cpu-usage ram-usage time"
set -g @dracula-fixed-location "Seoul"
set -g status-position top

# Resurrect 
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'
set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'
set -g @resurrect-strategy-vim 'session'

# Continuum
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Mouse scroll
set -g mouse on

# Initialize TPM (keep this line at the very of bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# 플러그인 로드 이후에 적용 (tmux-sensible 덮어쓰기 방지)
set -g automatic-rename off
set -g automatic-rename-format ""

# Dracula 테마가 #T(pane title)를 쓰므로 #W(window name)로 덮어쓰기
set -g window-status-format "#[fg=#11111b,bg=#585b70] #I #[fg=#cdd6f4,bg=#313244] #W "
set -g window-status-current-format "#[fg=#11111b,bg=#cba6f7] #I #[fg=#cdd6f4,bg=#45475a] #W "

# Synchronize-panes
bind e setw synchronize-panes \; display-message "Sync: #{?pane_synchronized,ON,OFF}"

# Lazygit popup (현재 pane 의 작업 디렉토리에서 실행)
bind g display-popup -E -w 90% -h 90% -d "#{pane_current_path}" "lazygit"
