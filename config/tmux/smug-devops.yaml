# smug 세션 정의 — devops (구조만: 창/pane/ssh/레이아웃)
# 실행은 런처로:  devops   (= smug-devops.sh)
#   → smug 로 이 구조를 만든 뒤, pane 라벨(@host)/border 는 런처가 race-free 로 설정.
# 호스트 추가 = pane 한 줄 추가.  (라벨이 필요한 창이면 smug-devops.sh 의 label 줄도 갱신)
session: devops
root: ~

windows:
  - name: r2d2
    commands: [ssh r2d2]

  - name: devbox
    commands: [ssh devbox]

  - name: staging
    commands: [ssh staging]

  # 위 star-1 / 아래 star-2 (라벨은 런처가 pane index 로 지정)
  - name: kt-star-was-deploy
    layout: even-vertical
    commands: [ssh star-1]
    panes:
      - commands: [ssh star-2]

  # 2x2: pane1,2=star-1 / pane3,4=star-2 (라벨은 런처가 지정)
  - name: kt-star-was-log
    layout: tiled
    commands: [ssh star-1]
    panes:
      - commands: [ssh star-1]
      - commands: [ssh star-2]
      - commands: [ssh star-2]

  - name: kt-starfruit-nats
    layout: tiled
    commands: [ssh star-nats-1]
    panes:
      - commands: [ssh star-nats-2]
      - commands: [ssh star-nats-3]

  - name: medichis
    commands: [ssh kt-gateway]
